appId: dev.orion-agent.cowork
productName: Orion Cowork
copyright: Copyright © 2026
artifactName: ${productName}-${version}-${arch}.${ext}

# npm workspaces hoist electron → root/node_modules,electron-builder 從 cowork/
# 跑時找不到。顯式指定版本,bypass introspection。
electronVersion: 33.4.11

directories:
  buildResources: build
  output: dist/installers
  app: .

# Renderer build output + Electron main/preload/sidecar(TS 編譯後)+ package.json
files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - package.json

# PyInstaller 打包好的 sidecar binary 進 Resources/sidecar/
extraResources:
  - from: dist/sidecar/orion-cowork-sidecar
    to: sidecar/orion-cowork-sidecar
    filter:
      - "!*.exe"

# Windows 例外:走 .exe
extraFiles: []

mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing & notarization(env-gated)— env 沒設 → unsigned build,user 機要
  # 手動「右鍵 → 開啟」過 Gatekeeper。env 全設 → 自動簽 + notarize:
  #   CSC_LINK           Developer ID Application 憑證 .p12 base64(或 path)
  #   CSC_KEY_PASSWORD   .p12 解密密碼
  #   APPLE_ID           Apple ID(notarize 用)
  #   APPLE_APP_SPECIFIC_PASSWORD  app-specific password
  #   APPLE_TEAM_ID      team ID
  notarize: false  # 由 GH Actions 跑時設 true + 提供 env
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64
  extraResources:
    - from: dist/sidecar/orion-cowork-sidecar.exe
      to: sidecar/orion-cowork-sidecar.exe
  # Windows signing(env-gated):
  #   WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD
  # 沒設 → unsigned

linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64

# ─── electron-updater(Phase 33-F)─────────────────────────────────────────
# 發布到 GitHub Releases — `npm run release` 會用 GH_TOKEN 發 tag → upload
# DMG / NSIS / latest.yml。client 端 electron-updater 自動 poll latest。
publish:
  - provider: github
    owner: sun873087
    repo: orion-agent
    releaseType: release
