# orion-agent 本機 stack — Phase 7。
# 跑法(從 orion-agent/ root):
#   docker compose -f deploy/docker-compose.yml up --build
#
# 注意:Docker sandbox 需要把 host docker.sock 掛進 API container,
# 或讓 API 連 host docker(--privileged / DinD)。 Phase 7 範圍簡單做法:
# bind-mount /var/run/docker.sock(local dev only — production 走 K8s job)。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_dev
      POSTGRES_DB: orion
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - orion_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORION_DB_URL: postgresql+asyncpg://orion:orion_dev@postgres:5432/orion
      ORION_DB_AUTO_CREATE: "1"
      ORION_LOG_FORMAT: json
      ORION_LOG_LEVEL: info
      ORION_SANDBOX: docker
      # Production 真上線必設:
      # ORION_JWT_SECRET: <random-256-bit-hex>
      # ANTHROPIC_API_KEY / OPENAI_API_KEY: ...
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      # Local dev only — 讓 DockerBackend 連 host docker daemon
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  orion_pgdata:
