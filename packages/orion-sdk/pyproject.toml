[project]
name = "orion-sdk"
version = "0.1.0"
description = "Agent runtime SDK — Conversation loop, tools, MCP, sandbox, memory."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Orion Agent" },
]
dependencies = [
    "orion-model",
    "pydantic>=2.0",
    "anyio>=4.0",
    "structlog>=24.0",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "mcp>=1.0",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "aiosqlite>=0.19",
    "docker>=7.0",
    "python-frontmatter>=1.1",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-grpc>=1.27",
    "apscheduler>=3.10",
    "pyinstrument>=4.6",
    "nbformat>=5.10",
    "cryptography>=42.0",
    "keyring>=24.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.6",
    "hypothesis>=6.0",
    "pytest-cov>=5.0",
]

[tool.uv.sources]
orion-model = { workspace = true }

[tool.mypy]
strict = true
python_version = "3.11"
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["frontmatter.*", "nbformat.*", "apscheduler.*", "pyinstrument.*", "keyring.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM", "TID"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = ["-v", "--strict-markers", "--tb=short"]
markers = [
    "integration: requires real API keys, skip by default",
]

[tool.coverage.run]
source = ["src/orion_sdk"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orion_sdk"]
