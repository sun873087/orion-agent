[alembic]
script_location = src/orion_agent/storage/db/alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./orion-dev.db

# 用環境變數覆蓋:ORION_DB_URL 由 env.py 讀取(.url 上面只是 fallback)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
