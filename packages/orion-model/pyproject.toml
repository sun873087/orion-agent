[project]
name = "orion-model"
version = "0.1.0"
description = "LLM provider abstraction (Anthropic / OpenAI) — normalized events, tool defs, pricing."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "anthropic>=0.40.0",
    "openai>=1.50.0",
    "pydantic>=2.0",
    "httpx>=0.27",
    "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orion_model"]
