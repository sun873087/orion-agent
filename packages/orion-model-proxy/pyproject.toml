[project]
name = "orion-model-proxy"
version = "0.1.0"
description = "HTTP proxy server in front of orion-model — centralised key / cost / routing for CLI / Chat / Cowork."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "orion-model",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[project.scripts]
orion-model-proxy = "orion_model_proxy.__main__:main"

[tool.uv.sources]
orion-model = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orion_model_proxy"]
