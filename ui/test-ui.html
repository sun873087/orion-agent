<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Orion Agent Dev Test</title>
<style>
  body { font-family: monospace; max-width: 900px; margin: 20px auto; padding: 20px; }
  #messages { background: #f5f5f5; padding: 12px; height: 500px;
              overflow-y: auto; border: 1px solid #ccc; }
  .user { color: #0066cc; }
  .assistant { color: #333; white-space: pre-wrap; }
  .thinking { color: #999; font-style: italic; white-space: pre-wrap; }
  .tool-use { color: #888; background: #eef; padding: 4px 8px; margin: 4px 0;
              border-left: 3px solid #66f; font-size: 12px; }
  .tool-result { color: #555; background: #efe; padding: 4px 8px;
                 border-left: 3px solid #6f6; font-size: 12px;
                 white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  .permission { background: #fee; padding: 8px; margin: 4px 0;
                border: 2px solid #f66; border-radius: 4px; }
  .error { color: #c00; }
  .stat { color: #888; font-size: 11px; }
  #prompt { width: 100%; padding: 8px; font-family: monospace; }
  button { padding: 6px 12px; margin-right: 4px; }
  .row { margin: 6px 0; }
  .row label { display: inline-block; min-width: 80px; }
</style>
</head>
<body>

<h1>Orion Agent Dev Test</h1>

<div class="row">
  <label>Backend:</label>
  <input id="endpoint" value="http://localhost:8000" size="36" />
</div>
<div class="row">
  <label>Username:</label>
  <input id="username" value="alice" size="16" />
  <button onclick="login()">Login (get JWT)</button>
  <span id="loginStatus" class="stat"></span>
</div>
<div class="row">
  <label>Session:</label>
  <input id="sessionId" placeholder="(click New Session)" size="40" />
  <button onclick="newSession()">New Session</button>
  <button onclick="connectWS()">Connect WS</button>
</div>

<div id="messages"></div>

<p>
  <textarea id="prompt" rows="3" placeholder="Type prompt... (Ctrl/Cmd+Enter to send)"></textarea>
</p>
<p>
  <button onclick="send()">Send</button>
  <button onclick="abort()">Abort</button>
  <button onclick="clearChat()">Clear chat</button>
</p>

<script>
let ws = null;
let token = null;

function append(html, cls) {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView();
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
}

function endpoint() {
  return document.getElementById('endpoint').value.trim();
}

async function login() {
  const username = document.getElementById('username').value.trim() || 'alice';
  try {
    const r = await fetch(endpoint() + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    token = data.token;
    document.getElementById('loginStatus').textContent = `OK (${data.user_id})`;
  } catch (e) {
    document.getElementById('loginStatus').textContent = 'login failed: ' + e.message;
    append('[login failed: ' + e.message + ']', 'error');
  }
}

async function newSession() {
  if (!token) { await login(); }
  if (!token) return;
  try {
    const r = await fetch(endpoint() + '/sessions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    document.getElementById('sessionId').value = data.session_id;
    clearChat();
    append('[session created: ' + data.session_id + ']', 'stat');
    connectWS();
  } catch (e) {
    append('[new session failed: ' + e.message + ']', 'error');
  }
}

function connectWS() {
  if (!token) {
    append('[need to login first]', 'error');
    return;
  }
  if (ws) ws.close();
  const sid = document.getElementById('sessionId').value.trim();
  if (!sid) {
    append('[no session id]', 'error');
    return;
  }
  const wsUrl = endpoint().replace(/^http/, 'ws') + '/chat/stream/' + sid +
                '?token=' + encodeURIComponent(token);
  ws = new WebSocket(wsUrl);
  ws.onopen = () => append('[WS connected]', 'stat');
  ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
  ws.onclose = (e) => append('[WS closed: ' + e.code + ']', 'stat');
  ws.onerror = () => append('[WS error]', 'error');
}

let assistantBufferDiv = null;

function handleEvent(ev) {
  switch (ev.type) {
    case 'assistant_text':
      // 同一 turn 內 streaming text 累積到同一個 div
      if (!assistantBufferDiv) {
        assistantBufferDiv = document.createElement('div');
        assistantBufferDiv.className = 'assistant';
        assistantBufferDiv.innerHTML = '<b>[assistant]</b> ';
        document.getElementById('messages').appendChild(assistantBufferDiv);
      }
      assistantBufferDiv.innerHTML += escapeHtml(ev.text);
      assistantBufferDiv.scrollIntoView();
      break;
    case 'assistant_thinking':
      append('💭 ' + escapeHtml(ev.text), 'thinking');
      break;
    case 'tool_use':
      assistantBufferDiv = null;
      append('🔧 <b>' + escapeHtml(ev.tool_name) + '</b>(' +
             escapeHtml(JSON.stringify(ev.input)) + ')', 'tool-use');
      break;
    case 'tool_result':
      const cls = ev.is_error ? 'error' : 'tool-result';
      const prefix = ev.is_error ? '❌' : '↳';
      const txt = String(ev.content || '');
      const truncated = txt.length > 500 ? txt.slice(0, 500) + '...' : txt;
      append(prefix + ' <b>' + escapeHtml(ev.tool_name) + '</b>: ' +
             escapeHtml(truncated), cls);
      break;
    case 'permission_ask':
      assistantBufferDiv = null;
      const pid = ev.request_id;
      const html = `🔐 Allow <b>${escapeHtml(ev.tool_name)}</b>?
        <pre>${escapeHtml(JSON.stringify(ev.input, null, 2))}</pre>
        <button onclick="answerPermission('${pid}', 'allow')">Allow once</button>
        <button onclick="answerPermission('${pid}', 'always_allow')">Always</button>
        <button onclick="answerPermission('${pid}', 'deny')">Deny</button>
        <span class="stat">(timeout ${ev.timeout_seconds}s → auto deny)</span>`;
      append(html, 'permission');
      break;
    case 'turn_complete':
      assistantBufferDiv = null;
      append('━ turn complete (stop=' + ev.stop_reason +
             ', in=' + ev.input_tokens + ', out=' + ev.output_tokens + ')',
             'stat');
      break;
    case 'terminal':
      assistantBufferDiv = null;
      append('━━━ ' + ev.reason + ' (turns=' + ev.total_turns + ') ━━━', 'stat');
      break;
    case 'error':
      assistantBufferDiv = null;
      append('❌ ' + escapeHtml(ev.message), 'error');
      break;
    default:
      append('? unknown event: ' + escapeHtml(JSON.stringify(ev)), 'error');
  }
}

function answerPermission(requestId, decision) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type: 'permission_decision',
    request_id: requestId,
    decision: decision,
  }));
}

function send() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    append('[WS not connected — click Connect WS]', 'error');
    return;
  }
  const text = document.getElementById('prompt').value.trim();
  if (!text) return;
  append('<b class="user">[user]</b> ' + escapeHtml(text), 'user');
  ws.send(JSON.stringify({ type: 'user_message', content: text }));
  document.getElementById('prompt').value = '';
}

function abort() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'abort' }));
  append('[abort sent]', 'stat');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) send();
});
</script>

</body>
</html>
